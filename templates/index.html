<!DOCTYPE html>
<html>
<head>
    <title>HealthCheck AI</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f9fafb;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #16a34a;
        }
        input {
            padding: 10px;
            width: 300px;
        }
        button {
            padding: 10px 20px;
            background-color: #22c55e;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #16a34a;
        }
        .result {
            margin-top: 20px;
            color: #111827;
        }
    </style>
</head>
<body>

<h1>HealthCheck AI 🏥</h1>

<form method="POST">
    <input type="text" name="symptoms" placeholder="Enter symptoms..." required />
    <br><br>
    <button type="submit">Check</button>
</form>

<div class="result">
    <p>{{ advice }}</p>
</div>

</body>
</html>
